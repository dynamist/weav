[tox]
env_list =
    py311
    py312
    lint
    type
min_version = 4.0

[testenv]
description = Run unit tests
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=8.3.0
    pytest-cov>=6.0.0
commands =
    pytest {posargs:tests}

[testenv:lint]
description = Run linting and formatting checks
skip_install = false
deps =
    ruff>=0.8.0
commands =
    ruff check weav tests
    ruff format --check weav tests

[testenv:format]
description = Format code with ruff
skip_install = true
deps =
    ruff>=0.8.0
commands =
    ruff check --fix weav tests
    ruff format weav tests

[testenv:type]
description = Run type checking with mypy
skip_install = false
deps =
    mypy>=1.13.0
commands =
    mypy weav

[testenv:all]
description = Run all checks (tests, linting, type checking)
skip_install = false
deps =
    {[testenv]deps}
    {[testenv:lint]deps}
    {[testenv:type]deps}
commands =
    pytest {posargs:tests}
    ruff check weav tests
    ruff format --check weav tests
    mypy weav
